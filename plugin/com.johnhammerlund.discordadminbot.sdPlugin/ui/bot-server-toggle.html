<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
</head>
<body>
  <sdpi-item label="Bot Token">
    <sdpi-textfield setting="token" type="password" placeholder="Paste Discord bot token" autocomplete="off"></sdpi-textfield>
  </sdpi-item>
  <sdpi-item label="Guild ID">
    <sdpi-textfield setting="guildId" global placeholder="Right-click server → Copy Server ID"></sdpi-textfield>
  </sdpi-item>
  <sdpi-item label="WS Port">
    <sdpi-textfield setting="port" placeholder="57821 (default)"></sdpi-textfield>
  </sdpi-item>
</body>
</html>
