<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Switch Profile Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1e2124; color: #dcddde; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; padding: 10px; }
    .field { display: flex; align-items: center; margin-bottom: 8px; gap: 8px; }
    label { min-width: 90px; color: #72767d; text-align: right; flex-shrink: 0; }
    input { flex: 1; background: #2f3136; border: 1px solid #202225; border-radius: 4px; color: #dcddde; padding: 5px 8px; font-size: 12px; }
    input:focus { outline: none; border-color: #5865f2; }
    .hint { color: #72767d; font-size: 10px; margin-top: 10px; line-height: 1.5; border-top: 1px solid #2f3136; padding-top: 8px; }
  </style>
</head>
<body>
  <div class="field">
    <label>Profile</label>
    <input type="text" id="profileName" placeholder="Discord Voice"/>
  </div>

  <div class="hint">
    Must match the name of a profile bundled with this plugin.<br>
    The default "Discord Voice" profile is included — configure your<br>
    encoder actions there, then press this key to jump to it.
  </div>

  <script>
  let ws = null, ctx = null, settings = {}, dirty = false;

  function connectElgato(lang, port, pluginUUID, registerEvent, info, actionInfo) {
    const ai = JSON.parse(actionInfo);
    ctx = ai.context;
    settings = ai.payload.settings || {};
    updateUI();

    ws = new WebSocket("ws://127.0.0.1:" + port);
    ws.onopen = function() {
      ws.send(JSON.stringify({ event: registerEvent, uuid: pluginUUID }));
      if (dirty) save();
    };
    ws.onmessage = function(evt) {
      const data = JSON.parse(evt.data);
      if (data.event === "didReceiveSettings" && !dirty) {
        settings = data.payload.settings || {};
        updateUI();
      }
    };
  }

  function updateUI() {
    document.getElementById("profileName").value = settings.profileName || "";
  }

  function save() {
    dirty = true;
    settings.profileName = document.getElementById("profileName").value.trim() || "Discord Voice";
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ event: "setSettings", context: ctx, payload: settings }));
    }
  }

  var el = document.getElementById("profileName");
  el.addEventListener("change", save);
  el.addEventListener("input", save);
  </script>
</body>
</html>
