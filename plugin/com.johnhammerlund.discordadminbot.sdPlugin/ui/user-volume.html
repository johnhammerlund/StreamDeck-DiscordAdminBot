<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <script src="https://sdpi-components.dev/releases/v4/sdpi-components.js"></script>
</head>
<body>
  <sdpi-item label="Guild ID">
    <sdpi-textfield setting="guildId" global placeholder="Shared — set in Bot Server action"></sdpi-textfield>
  </sdpi-item>
  <sdpi-item label="Channel ID">
    <sdpi-textfield setting="channelId" placeholder="Right-click voice channel → Copy Channel ID"></sdpi-textfield>
  </sdpi-item>
  <sdpi-item label="Slot">
    <sdpi-select setting="slot">
      <option value="1">Slot 1 — 1st user to join</option>
      <option value="2">Slot 2</option>
      <option value="3">Slot 3</option>
      <option value="4">Slot 4</option>
      <option value="5">Slot 5</option>
      <option value="6">Slot 6</option>
      <option value="7">Slot 7</option>
      <option value="8">Slot 8</option>
    </sdpi-select>
  </sdpi-item>
</body>
</html>
